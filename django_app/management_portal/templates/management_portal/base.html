{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartCart Django Portal</title>
  <link rel="stylesheet" href="{% static 'management_portal/style.css' %}" />
</head>
<body>
  <header class="topbar">
    <div class="brand">SmartCart Django</div>
    <nav>
      <a href="{% url 'management_portal:dashboard' %}">Dashboard</a>
      <a href="{% url 'management_portal:users' %}">Users</a>
      <a href="{% url 'management_portal:recommendations' %}">Recommendations</a>
      <a href="{% url 'management_portal:rules' %}">Rules</a>
      <a href="{% url 'management_portal:results' %}">Results</a>
      <a href="/admin/">Admin</a>
    </nav>
  </header>

  <main class="container">
    {% if messages %}
      {% for message in messages %}
        <div class="flash flash-{{ message.tags|default:'info' }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
